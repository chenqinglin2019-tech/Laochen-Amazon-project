# Item Highlight / 商品亮点写作规则
# 来源：Amazon Seller Central 2026-06 标题更新通知

version: 0.1
domain: item_highlight
applies_to:
  category: ["*"]
rules:
  - id: ih_max_chars
    type: hard
    enforced_by: "POST /validate (backend)"
    note: "Item Highlight / 商品亮点总长度 ≤ 125 字符（含空格）"
    source: "Amazon Seller Central announcement, 2026-06"

  - id: ih_role
    type: soft
    prompt_fragment: |
      Item Highlight 是标题下方的可搜索补充信息，用来承接短标题放不下的
      材质、建议使用场景、关键规格或比较点。不要重复标题原句。
    source: "Amazon Seller Central announcement, 2026-06"

  - id: ih_content_priority
    type: soft
    prompt_fragment: |
      优先写 1-2 个买家最关心的信息：
      - 材质或结构（如 aluminum, silicone, waterproof fabric）
      - 推荐使用场景（如 desk, kitchen, travel, camping）
      - 关键兼容性或规格（如 fits 4-10 inch phones）
      - Rufus QA 中高频问题的直接答案
      不要写促销词、极限词、无授权品牌词。
    source: "Amazon title update best practice"

  - id: ih_style
    type: soft
    prompt_fragment: |
      写成一句自然英文短句或短语，信息密度高但可读。
      示例：Aluminum foldable design for desk, kitchen, travel and video calls
      避免逗号堆词和 keyword stuffing。
    source: "Amazon SEO best practice"
